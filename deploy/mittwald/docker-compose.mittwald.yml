# mStudio stack (Compose-Referenz). CI nutzt deploy/mittwald/stack.yaml + deploy-container-action.
name: metaorder-v2

services:
  metaorder-app:
    image: ${APP_IMAGE:-ghcr.io/meta-regalbau/metaorder-v2:latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
      UPLOADS_DIR: /app/uploads
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      REQUEST_LOG_SLOW_MS: ${REQUEST_LOG_SLOW_MS:-0}
      METAORDER_STRICT_TENANT: ${METAORDER_STRICT_TENANT:-true}
      METAORDER_INTEGRATION_API_KEY: ${METAORDER_INTEGRATION_API_KEY:-}
      METAORDER_INTEGRATION_USER_ID: ${METAORDER_INTEGRATION_USER_ID:-}
      METAORDER_INTEGRATION_TENANT_ID: ${METAORDER_INTEGRATION_TENANT_ID:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
      COMMERCIAL_AGENT_ENABLED: ${COMMERCIAL_AGENT_ENABLED:-}
      COMMERCIAL_AGENT_WEB_VERIFY: ${COMMERCIAL_AGENT_WEB_VERIFY:-}
      AI_MODE: ${AI_MODE:-}
    volumes:
      - metaorder_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://127.0.0.1:5000/healthz',(res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));\""
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

volumes:
  metaorder_uploads:

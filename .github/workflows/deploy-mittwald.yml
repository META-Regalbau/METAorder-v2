name: Deploy METAorder-v2 to Mittwald

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image-Tag (Git-SHA). Bei deploy_only=true: existierendes GHCR-Image ausrollen."
        required: false
        type: string
      deploy_only:
        description: "Nur ausrollen, kein Build (Rollback / Re-Deploy eines bestehenden Tags)."
        required: false
        type: boolean
        default: false

env:
  IMAGE_REPO: ghcr.io/meta-regalbau/metaorder-v2
  STACK_FILE: deploy/mittwald/stack.yaml

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_only != true)
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.IMAGE_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy stack to Mittwald mStudio
    runs-on: ubuntu-latest
    needs: build-push
    if: always() && (needs.build-push.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.deploy_only == true))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy image
        id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_only }}" == "true" ]]; then
            TAG="${{ inputs.image_tag }}"
            if [[ -z "$TAG" ]]; then
              echo "deploy_only erfordert image_tag." >&2
              exit 1
            fi
          else
            TAG="${{ needs.build-push.outputs.image_tag }}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.IMAGE_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check Mittwald configuration
        id: config
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
          MITTWALD_STACK_ID: ${{ secrets.MITTWALD_STACK_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [[ -z "${MITTWALD_API_TOKEN}" || -z "${MITTWALD_STACK_ID}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy uebersprungen: MITTWALD_API_TOKEN oder MITTWALD_STACK_ID fehlt."
            exit 0
          fi
          if [[ -z "${DATABASE_URL}" || -z "${SESSION_SECRET}" || -z "${ENCRYPTION_KEY}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy uebersprungen: DATABASE_URL, SESSION_SECRET oder ENCRYPTION_KEY fehlt."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to mStudio
        if: steps.config.outputs.ready == 'true'
        uses: mittwald/deploy-container-action@v1
        env:
          APP_IMAGE: ${{ steps.deploy.outputs.image_ref }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          REQUEST_LOG_SLOW_MS: ${{ vars.REQUEST_LOG_SLOW_MS || '1500' }}
          METAORDER_STRICT_TENANT: ${{ vars.METAORDER_STRICT_TENANT || 'true' }}
          METAORDER_INTEGRATION_API_KEY: ${{ secrets.METAORDER_INTEGRATION_API_KEY }}
          METAORDER_INTEGRATION_USER_ID: ${{ secrets.METAORDER_INTEGRATION_USER_ID }}
          METAORDER_INTEGRATION_TENANT_ID: ${{ secrets.METAORDER_INTEGRATION_TENANT_ID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE || 'true' }}
          S3_OBJECT_PREFIX: ${{ vars.S3_OBJECT_PREFIX }}
          COMMERCIAL_AGENT_ENABLED: ${{ vars.COMMERCIAL_AGENT_ENABLED || 'true' }}
          COMMERCIAL_AGENT_WEB_VERIFY: ${{ vars.COMMERCIAL_AGENT_WEB_VERIFY || 'false' }}
          AI_MODE: ${{ vars.AI_MODE || 'openai_optional' }}
        with:
          api_token: ${{ secrets.MITTWALD_API_TOKEN }}
          stack_id: ${{ secrets.MITTWALD_STACK_ID }}
          stack_file: ${{ github.workspace }}/${{ env.STACK_FILE }}

      - name: Deploy skipped summary
        if: steps.config.outputs.ready != 'true'
        run: |
          echo "Image bereit: ${{ steps.deploy.outputs.image_ref }}"
          echo "Stack-Datei: ${{ env.STACK_FILE }}"

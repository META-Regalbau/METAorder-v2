name: Deploy METAorder-v2 to Mittwald

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image-Tag (Git-SHA). Bei deploy_only=true: existierendes GHCR-Image ausrollen."
        required: false
        type: string
      deploy_only:
        description: "Nur ausrollen, kein Build (Rollback / Re-Deploy eines bestehenden Tags)."
        required: false
        type: boolean
        default: false

env:
  IMAGE_REPO: ghcr.io/meta-regalbau/metaorder-v2
  STACK_FILE: deploy/mittwald/stack.yaml

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_only != true)
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.IMAGE_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy stack to Mittwald mStudio
    runs-on: ubuntu-latest
    needs: build-push
    if: always() && (needs.build-push.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.deploy_only == true))
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL || 'https://p-bbpye5.project.space' }}
      REQUEST_LOG_SLOW_MS: ${{ vars.REQUEST_LOG_SLOW_MS || '1500' }}
      METAORDER_STRICT_TENANT: ${{ vars.METAORDER_STRICT_TENANT || 'true' }}
      COMMERCIAL_AGENT_ENABLED: ${{ vars.COMMERCIAL_AGENT_ENABLED || 'true' }}
      COMMERCIAL_AGENT_WEB_VERIFY: ${{ vars.COMMERCIAL_AGENT_WEB_VERIFY || 'false' }}
      AI_MODE: ${{ vars.AI_MODE || 'openai_optional' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy image
        id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_only }}" == "true" ]]; then
            TAG="${{ inputs.image_tag }}"
            if [[ -z "$TAG" ]]; then
              echo "deploy_only erfordert image_tag." >&2
              exit 1
            fi
          else
            TAG="${{ needs.build-push.outputs.image_tag }}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.IMAGE_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check Mittwald configuration
        id: config
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
          MITTWALD_STACK_ID: ${{ secrets.MITTWALD_STACK_ID || vars.MITTWALD_STACK_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"

          missing=()
          [[ -n "${MITTWALD_API_TOKEN}" ]] && echo "MITTWALD_API_TOKEN: gesetzt" || missing+=("MITTWALD_API_TOKEN")
          [[ -n "${MITTWALD_STACK_ID}" ]] && echo "MITTWALD_STACK_ID: gesetzt" || missing+=("MITTWALD_STACK_ID (Secret oder Variable)")
          [[ -n "${DATABASE_URL}" ]] && echo "DATABASE_URL: gesetzt" || missing+=("DATABASE_URL")
          [[ -n "${SESSION_SECRET}" ]] && echo "SESSION_SECRET: gesetzt" || missing+=("SESSION_SECRET")
          [[ -n "${ENCRYPTION_KEY}" ]] && echo "ENCRYPTION_KEY: gesetzt" || missing+=("ENCRYPTION_KEY")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::error::Deploy nicht moeglich. Fehlende Werte: ${missing[*]}"
            echo "Secrets muessen im Repo META-Regalbau/METAorder-v2 unter Settings → Secrets and variables → Actions liegen."
            echo "Stack-ID darf auch als Variable MITTWALD_STACK_ID gesetzt werden."
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Alle Pflichtwerte fuer den Deploy sind vorhanden."

      - name: Verify stack file (no stale template placeholders)
        if: steps.config.outputs.ready == 'true'
        run: |
          echo "Git commit: $(git rev-parse --short HEAD)"
          echo "Stack file preview:"
          head -n 5 "${{ github.workspace }}/${{ env.STACK_FILE }}"
          if grep -q 'VAR_NAME' "${{ github.workspace }}/${{ env.STACK_FILE }}"; then
            echo "::error::stack.yaml enthaelt noch VAR_NAME — alter Stand. Nicht 'Re-run' eines alten Jobs nutzen; Workflow auf main neu starten."
            exit 1
          fi

      - name: Deploy to mStudio
        if: steps.config.outputs.ready == 'true'
        uses: mittwald/deploy-container-action@v1
        env:
          APP_IMAGE: ${{ steps.deploy.outputs.image_ref }}
        with:
          api_token: ${{ secrets.MITTWALD_API_TOKEN }}
          stack_id: ${{ secrets.MITTWALD_STACK_ID || vars.MITTWALD_STACK_ID }}
          stack_file: ${{ github.workspace }}/${{ env.STACK_FILE }}

      - name: Deploy configuration failed
        if: failure() && steps.config.outputs.ready != 'true'
        run: |
          echo "Image waere bereit gewesen: ${{ steps.deploy.outputs.image_ref }}"
          echo "Stack-Datei: ${{ env.STACK_FILE }}"
          echo "Stack-ID (Referenz): a86b11e2-5ea0-4777-a252-89d9a172c2c5"
